spack:
  concretizer:
    unify: true
  specs:
    - gcc
    - cmake
    - doxygen
    - lcov
    - kokkos@5 +cuda cuda_arch=86 +wrapper +openmp +serial
    - kokkos-kernels@5 +cuda cuda_arch=86 +openmp +serial
    - arborx@2.1 ~mpi +cuda cuda_arch=86 +openmp +serial
    - py-pybind11
    - py-numpy

  config:
    install_tree:
      root: /opt/spack
      padded_length: 128

  packages:
    all:
      require: 'target=x86_64_v3'

  mirrors:
    pacman-ci-buildcache-linux:
      url: oci://ghcr.io/messahelramzi/pacman-ci-buildcache-linux:latest
      binary: true
      signed: false
      access_pair:
        id_variable: GITHUB_USER
        secret_variable: GITHUB_TOKEN